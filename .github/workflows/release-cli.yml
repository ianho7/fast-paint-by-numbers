name: Build And Release CLI

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build:
    name: Build ${{ matrix.label }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            label: windows-x64
            binary_name: pbn-cli.exe
            asset_name: pbn-cli-windows-x64.zip
          - os: ubuntu-latest
            label: linux-x64
            binary_name: pbn-cli
            asset_name: pbn-cli-linux-x64.tar.gz
          - os: ubuntu-24.04-arm
            label: linux-arm64
            binary_name: pbn-cli
            asset_name: pbn-cli-linux-arm64.tar.gz
          - os: macos-latest
            label: macos-arm64
            binary_name: pbn-cli
            asset_name: pbn-cli-macos-arm64.tar.gz
          - os: macos-15-intel
            label: macos-x64
            binary_name: pbn-cli
            asset_name: pbn-cli-macos-x64.tar.gz

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build release binary
        run: cargo build --release -p pbn-cli

      - name: Package release asset (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item target/release/${{ matrix.binary_name }} dist/${{ matrix.binary_name }}
          if (Test-Path README.md) { Copy-Item README.md dist/README.md }
          if (Test-Path LICENSE) { Copy-Item LICENSE dist/LICENSE }
          Compress-Archive -Path dist/* -DestinationPath ${{ matrix.asset_name }} -Force

      - name: Package release asset (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          mkdir -p dist
          cp target/release/${{ matrix.binary_name }} dist/${{ matrix.binary_name }}
          [ -f README.md ] && cp README.md dist/README.md
          [ -f LICENSE ] && cp LICENSE dist/LICENSE
          tar -czf "${{ matrix.asset_name }}" -C dist .

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.label }}
          path: ${{ matrix.asset_name }}
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')

    permissions:
      contents: write

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            release-assets/windows-x64/pbn-cli-windows-x64.zip
            release-assets/linux-x64/pbn-cli-linux-x64.tar.gz
            release-assets/linux-arm64/pbn-cli-linux-arm64.tar.gz
            release-assets/macos-arm64/pbn-cli-macos-arm64.tar.gz
            release-assets/macos-x64/pbn-cli-macos-x64.tar.gz
